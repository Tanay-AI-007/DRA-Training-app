<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | DRA Training</title>
    <link rel="stylesheet" href="../CSS/main.css">
    <style>
        body {
            background-color: #0f172a; /* Dark navy for admin */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .admin-login-card {
            width: 100%;
            max-width: 400px;
            background: var(--white);
            border-radius: var(--border-radius-card);
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }

        .admin-badge {
            display: inline-block;
            background-color: var(--primary-light);
            color: var(--primary-dark);
            padding: 4px 12px;
            border-radius: var(--border-radius-pill);
            font-size: 12px;
            font-weight: 800;
            margin-bottom: 24px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- Dark Mode Shapes -->
    <div class="shape-1" style="background-color: rgba(59, 130, 246, 0.2); left: -100px; top: -50px;"></div>
    <div class="shape-2" style="background-color: rgba(147, 197, 253, 0.1); right: -100px; bottom: -50px;"></div>

    <div class="admin-login-card text-center">
        <span class="admin-badge">Admin Portal</span>
        <h2 class="mb-3" style="color: var(--text-primary);">Welcome Back</h2>
        
        <form action="dashboard.html" style="text-align: left;">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" placeholder="admin@iibf.org.in" required>
            </div>
            
            <div class="form-group mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Login to Dashboard</button>
        </form>

        <p class="mt-3" style="font-size: 13px;"><a href="../index.html" style="color: var(--text-muted);">&larr; Back to Student Portal</a></p>
    </div>

</body>
</html>
