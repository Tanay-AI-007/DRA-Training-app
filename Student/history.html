<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History | DRA Training</title>
    <link rel="stylesheet" href="../CSS/main.css">
    <link rel="stylesheet" href="../CSS/student.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="top-bar" style="padding-bottom: 50px;">
        <h2>Test History</h2>
    </div>

    <div class="dashboard-content">
        <div class="card test-card mb-2 mt-3">
            <div class="test-card-header mb-1">
                <div class="test-card-title">Module 1: Principles of Banking</div>
                <div style="color: var(--success); font-weight: bold;">80%</div>
            </div>
            <div class="test-meta d-flex justify-between">
                <span>Oct 12, 2023</span>
                <span>24/30 Correct</span>
            </div>
        </div>

        <div class="card test-card mb-2">
            <div class="test-card-header mb-1">
                <div class="test-card-title">Module 2: Customer Service</div>
                <div style="color: var(--warning); font-weight: bold;">65%</div>
            </div>
            <div class="test-meta d-flex justify-between">
                <span>Oct 10, 2023</span>
                <span>32/50 Correct</span>
            </div>
        </div>

        <div class="card test-card mb-3">
            <div class="test-card-header mb-1">
                <div class="test-card-title">Mock Exam - Full Setup</div>
                <div style="color: var(--danger); font-weight: bold;">42%</div>
            </div>
            <div class="test-meta d-flex justify-between">
                <span>Oct 05, 2023</span>
                <span>42/100 Correct</span>
            </div>
        </div>
    </div>

    <!-- Bottom Tab Bar -->
    <div class="bottom-tab-bar">
        <a href="dashboard.html" class="tab-item" style="text-decoration: none;">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <div class="tab-item active">
            <i class="fa-solid fa-clock-rotate-left"></i>
            <span>History</span>
        </div>
        <div class="tab-item">
            <i class="fa-regular fa-user"></i>
            <span>Profile</span>
        </div>
    </div>

    <script>
        window.addEventListener('offline', () => {
            document.body.innerHTML = `
                <div style="text-align:center; padding:40px;">
                    <h2>No Internet Connection</h2>
                    <p>Please check your network and try again.</p>
                </div>
            `
        })
    </script>

</body>
</html>
