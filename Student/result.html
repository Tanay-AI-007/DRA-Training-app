<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result | DRA Training</title>
    <link rel="stylesheet" href="../CSS/main.css">
    <link rel="stylesheet" href="../CSS/student.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container" style="padding-top: 40px;">
        <div class="text-center">
            <h2 style="font-size: 24px;">Test Completed</h2>
            <p>Module 1: Principles of Banking</p>
        </div>

        <div class="result-circle-container">
            <div class="result-circle">
                <div class="result-score">24</div>
                <div class="result-total">out of 30</div>
            </div>
        </div>

        <div class="result-percentage pct-green">
            80% - Passed
        </div>

        <div class="summary-cards">
            <div class="card">
                <div style="color: var(--success); font-size: 20px; font-weight: 800;">24</div>
                <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">Correct</div>
            </div>
            <div class="card">
                <div style="color: var(--danger); font-size: 20px; font-weight: 800;">4</div>
                <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">Wrong</div>
            </div>
            <div class="card">
                <div style="color: var(--warning); font-size: 20px; font-weight: 800;">2</div>
                <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">Skipped</div>
            </div>
        </div>

        <div class="d-flex flex-column gap-2" style="gap: 12px;">
            <button class="btn btn-primary btn-block">View Answers</button>
            <a href="dashboard.html" class="btn btn-outline-white btn-block" style="border: 2px solid #cbd5e1; color: var(--text-primary);">Back to Dashboard</a>
        </div>

        <div class="ad-banner">
            Ad Banner Space (320x50)
        </div>
    </div>

    <script>
        window.addEventListener('offline', () => {
            document.body.innerHTML = `
                <div style="text-align:center; padding:40px;">
                    <h2>No Internet Connection</h2>
                    <p>Please check your network and try again.</p>
                </div>
            `
        })
    </script>

</body>
</html>
