<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DRA Training</title>
    <meta name="description" content="Login to your DRA Training account - Nexus DRA Training Center Pune">
    <link rel="stylesheet" href="CSS/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="login-page">

        <!-- ──────── LEFT PANEL ──────── -->
        <div class="login-left">

            <!-- Logo Bar -->
            <div class="login-logo-bar">
                <img src="Assets/Logo/nexus-dra-logo.png" alt="Nexus DRA Training Center Pune">
                <div class="brand-text">
                    <span class="brand-name">DRA Training</span>
                    <span class="brand-sub">by Nexus Training Center, Pune</span>
                </div>
            </div>

            <!-- Welcome Section -->
            <div class="login-welcome">
                <h1>Welcome <span class="accent">Back!</span></h1>
                <p>Login to continue your DRA training journey.</p>
            </div>

            <!-- Tabs -->
            <div class="login-tabs">
                <button class="tab active" id="tab-student">Student</button>
                <button class="tab" id="tab-admin">Admin</button>
            </div>

            <!-- Login Form -->
            <div class="login-form">

                <!-- Email -->
                <div class="field-group">
                    <span class="field-icon"><i class="fa-regular fa-envelope"></i></span>
                    <input type="email" id="email" placeholder="Email address" required>
                </div>

                <!-- Password -->
                <div class="field-group">
                    <span class="field-icon"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="password" placeholder="Password" required>
                    <span class="field-action" id="toggle-password"><i class="fa-regular fa-eye"></i></span>
                </div>

                <!-- Monthly Access Code -->
                <div class="field-group access-code-field">
                    <span class="field-icon"><i class="fa-solid fa-key"></i></span>
                    <input type="text" id="access-code" placeholder="Monthly Access Code" required>
                    <span class="field-action"><i class="fa-solid fa-shield-halved"></i></span>
                </div>

                <p class="access-code-help">Contact your institute for access code</p>

                <!-- Error Message -->
                <div id="error-msg" class="error-msg"></div>

                <!-- Login Button -->
                <button id="login-btn" class="login-btn">
                    LOGIN <span class="arrow">&rarr;</span>
                </button>
            </div>

            <!-- Bottom Links -->
            <div class="login-bottom-links">
                <p>Don't have an account? <a href="/register.html">Register</a></p>
                <p class="admin-link"><a href="Admin/login.html">Admin Portal</a></p>
            </div>

            <!-- Footer -->
            <div class="login-footer">
                <p>&copy; 2026 IIBF. All rights reserved.</p>
            </div>

        </div>

        <!-- ──────── RIGHT PANEL ──────── -->
        <div class="login-right">
            <a href="#" class="instructions-link">Click here for Instructions <i class="fa-solid fa-circle-info"></i></a>

            <!-- Decorative elements -->
            <div class="decor-dots top-left"></div>
            <div class="decor-dots bottom-right"></div>
            <div class="dra-watermark">DRA</div>

            <!-- Illustration -->
            <div class="illustration-wrapper">
                <img src="Assets/Logo/hero-illustration.png" alt="DRA Training Illustration">
            </div>
        </div>

    </div>

    <!-- ──────── SCRIPTS (same functionality) ──────── -->
    <script type="module">
        import { loginStudent } from './JS/auth.js'

        // Tab switching
        document.getElementById('tab-student').addEventListener('click', () => {
            document.getElementById('tab-student').classList.add('active')
            document.getElementById('tab-admin').classList.remove('active')
        })

        document.getElementById('tab-admin').addEventListener('click', () => {
            document.getElementById('tab-admin').classList.add('active')
            document.getElementById('tab-student').classList.remove('active')
            window.location.href = 'Admin/login.html'
        })

        // Toggle password visibility
        document.getElementById('toggle-password').addEventListener('click', () => {
            const input = document.getElementById('password')
            const icon = document.getElementById('toggle-password').querySelector('i')
            if (input.type === 'password') {
                input.type = 'text'
                icon.classList.remove('fa-eye')
                icon.classList.add('fa-eye-slash')
            } else {
                input.type = 'password'
                icon.classList.remove('fa-eye-slash')
                icon.classList.add('fa-eye')
            }
        })

        // Login handler
        document.getElementById('login-btn').addEventListener('click', async () => {
            const email      = document.getElementById('email').value.trim()
            const password   = document.getElementById('password').value
            const accessCode = document.getElementById('access-code').value.trim()
            const errorDiv   = document.getElementById('error-msg')
            const btn        = document.getElementById('login-btn')

            errorDiv.textContent = ''

            if (!email || !password || !accessCode) {
                errorDiv.textContent = 'Please fill all fields.'
                return
            }

            btn.innerHTML = 'Logging in...'
            btn.disabled = true

            const result = await loginStudent(email, password, accessCode)

            if (result.error) {
                errorDiv.textContent = result.error
                btn.innerHTML = 'LOGIN <span class="arrow">&rarr;</span>'
                btn.disabled = false
            } else {
                window.location.href = '/Student/dashboard.html'
            }
        })
    </script>

    <script>
        // Offline detection
        function setupOfflineDetection() {
            function showOverlay() {
                if (!document.getElementById('offline-overlay')) {
                    const overlay = document.createElement('div');
                    overlay.id = 'offline-overlay';
                    overlay.className = 'offline-overlay';
                    overlay.textContent = '⚠️ You are offline. Please check your connection.';
                    document.body.appendChild(overlay);
                }
            }
            function hideOverlay() {
                const overlay = document.getElementById('offline-overlay');
                if (overlay) overlay.remove();
            }
            window.addEventListener('offline', showOverlay);
            window.addEventListener('online', hideOverlay);
            if (!navigator.onLine) showOverlay();
        }
        setupOfflineDetection();
    </script>

</body>
</html>
