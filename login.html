<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DRA Training</title>
    <link rel="stylesheet" href="CSS/main.css">
</head>
<body>

    <div class="shape-bg-light-container">
        <div class="shape-1" style="background-color: var(--primary-light); top: -200px; right: -100px; opacity: 0.3;"></div>
        <div class="shape-2" style="background-color: var(--primary-medium); top: -50px; left: -150px; opacity: 0.1;"></div>
    </div>

    <div class="container d-flex flex-column justify-center" style="min-height: 100vh;">

        <div class="text-center mb-3">
            <h2 style="color: var(--primary-dark); font-size: 28px;">Welcome Back</h2>
            <p>Login to your DRA Training account</p>
        </div>

        <div class="card">

            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div style="position: relative;">
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    <span id="toggle-password" style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 18px; user-select: none;">👁️</span>
                </div>
            </div>

            <div class="form-group mb-3">
                <label class="form-label" style="display: flex; justify-content: space-between;">
                    Monthly Access Code <span>🔒</span>
                </label>
                <input type="text" id="access-code" class="form-control input-highlight" placeholder="Enter Access Code" required>
                <p style="font-size: 12px; margin-top: 6px; color: var(--danger);">* Get this code from your institute</p>
                <div id="error-msg" style="color: var(--danger); font-size: 13px; margin-top: 6px; font-weight: 600;"></div>
            </div>

            <button id="login-btn" class="btn btn-primary btn-block">Login</button>

        </div>

        <div class="text-center mt-3">
            <p>Don't have an account? <a href="/register.html">Register</a></p>
            <p class="mt-2" style="font-size: 12px;"><a href="Admin/login.html" style="color: var(--text-muted);">Admin Portal</a></p>
        </div>

    </div>

    <script type="module">
        import { loginStudent } from './JS/auth.js'

        document.getElementById('toggle-password').addEventListener('click', () => {
            const input = document.getElementById('password')
            const icon = document.getElementById('toggle-password')
            if (input.type === 'password') {
                input.type = 'text'
                icon.textContent = '🙈'
            } else {
                input.type = 'password'
                icon.textContent = '👁️'
            }
        })

        document.getElementById('login-btn').addEventListener('click', async () => {
            const email      = document.getElementById('email').value.trim()
            const password   = document.getElementById('password').value
            const accessCode = document.getElementById('access-code').value.trim()
            const errorDiv   = document.getElementById('error-msg')
            const btn        = document.getElementById('login-btn')

            errorDiv.textContent = ''

            if (!email || !password || !accessCode) {
                errorDiv.textContent = 'Please fill all fields.'
                return
            }

            btn.textContent = 'Logging in...'
            btn.disabled = true

            const result = await loginStudent(email, password, accessCode)

            if (result.error) {
                errorDiv.textContent = result.error
                btn.textContent = 'Login'
                btn.disabled = false
            } else {
                window.location.href = '/Student/dashboard.html'
            }
        })
    </script>

</body>
</html>
