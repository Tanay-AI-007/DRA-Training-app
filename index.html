<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Nexus DRA Training Center</title>
    <link rel="stylesheet" href="CSS/main.css">
    <link rel="stylesheet" href="CSS/animations.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --login-navy: #102d5f;
            --login-blue: #0654d9;
            --login-cyan: #0aa0c8;
            --login-muted: #6c7488;
            --login-border: #d5dae5;
        }

        html {
            scrollbar-gutter: stable;
        }

        body.login-body {
            min-height: 100vh;
            min-height: 100svh;
            margin: 0;
            overflow-x: hidden;
            overflow-y: hidden;
            background: #ffffff;
            color: var(--login-navy);
            font-family: "Segoe UI", Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .login-page {
            position: relative;
            display: grid;
            grid-template-columns: minmax(440px, 560px) minmax(0, 1fr);
            min-height: 100vh;
            min-height: 100svh;
            height: 100vh;
            height: 100svh;
            overflow: hidden;
            isolation: isolate;
            background: #ffffff;
        }

        .login-art {
            position: relative;
            z-index: 0;
            grid-column: 2;
            display: grid;
            place-items: center;
            min-height: 100vh;
            min-height: 100svh;
            height: 100vh;
            height: 100svh;
            padding: 0;
            overflow: hidden;
            background: #ffffff;
            pointer-events: none;
        }

        .login-art-image {
            width: 100%;
            height: 100%;
            max-width: none;
            object-fit: contain;
            object-position: center center;
            background: #ffffff;
            filter: drop-shadow(0 24px 36px rgba(34, 78, 132, 0.08));
        }

        .login-panel {
            position: relative;
            z-index: 3;
            grid-column: 1;
            grid-row: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100svh;
            height: 100vh;
            height: 100svh;
            width: 100%;
            min-width: 0;
            box-sizing: border-box;
            padding: clamp(34px, 5vh, 54px) clamp(28px, 4vw, 68px) clamp(30px, 5vh, 46px);
            overflow-x: hidden;
            overflow-y: auto;
            background: #ffffff;
            box-shadow: 18px 0 48px rgba(15, 45, 94, 0.06);
            scrollbar-width: none;
        }

        .login-panel::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        .brand-logo {
            display: block;
            width: min(340px, 100%);
            height: auto;
            object-fit: contain;
        }

        .login-content {
            width: min(440px, 100%);
            margin-top: clamp(30px, 5vh, 52px);
        }

        body[data-login-mode="student"][data-student-mode="register"] .login-content {
            margin-top: clamp(18px, 3vh, 34px);
        }

        .login-heading {
            margin: 0;
            color: #112d5f;
            font-size: 48px;
            font-weight: 800;
            line-height: 1.08;
            letter-spacing: 0;
        }

        .login-heading span {
            color: var(--login-cyan);
        }

        .login-subtitle {
            margin: 10px 0 0;
            color: var(--login-muted);
            font-size: 18px;
            font-weight: 500;
        }

        .role-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            margin-top: 36px;
            border-bottom: 2px solid #e3e6ed;
        }

        .role-tab {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 42px;
            border: 0;
            background: transparent;
            color: #747a8c;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 0;
            text-decoration: none;
            cursor: pointer;
        }

        .role-tab.active {
            color: var(--login-blue);
        }

        .role-tab.active::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            bottom: -2px;
            height: 3px;
            background: var(--login-blue);
        }

        .mode-only {
            display: none;
        }

        body[data-login-mode="student"] .student-only,
        body[data-login-mode="admin"] .admin-only {
            display: flex;
        }

        body[data-login-mode="student"] .student-copy,
        body[data-login-mode="admin"] .admin-copy {
            display: block;
        }

        body[data-login-mode="admin"] .student-only,
        body[data-login-mode="admin"] .student-copy,
        body[data-login-mode="student"] .admin-only,
        body[data-login-mode="student"] .admin-copy {
            display: none;
        }

        .student-mode-tabs {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 28px;
            width: 100%;
            height: 44px;
            color: #7c8292;
            font-size: 16px;
            font-weight: 700;
        }

        body[data-login-mode="student"] .student-mode-tabs {
            display: flex;
        }

        .student-mode-tab {
            border: 0;
            background: transparent;
            color: #707789;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
        }

        .student-mode-tab:focus {
            outline: none;
        }

        .student-mode-tab:focus-visible {
            color: var(--login-blue);
        }

        .student-mode-tab.active {
            color: var(--login-blue);
        }

        .login-only,
        .register-only {
            display: none !important;
        }

        body[data-login-mode="student"][data-student-mode="login"] .login-only,
        body[data-login-mode="student"][data-student-mode="register"] .register-only {
            display: flex !important;
        }

        body[data-login-mode="student"][data-student-mode="register"] .login-only,
        body[data-login-mode="student"][data-student-mode="login"] .register-only,
        body[data-login-mode="admin"] .login-only,
        body[data-login-mode="admin"] .register-only {
            display: none !important;
        }

        body[data-login-mode="student"][data-student-mode="login"] .login-copy,
        body[data-login-mode="student"][data-student-mode="register"] .register-copy {
            display: block;
        }

        body[data-login-mode="student"][data-student-mode="login"] .register-copy,
        body[data-login-mode="student"][data-student-mode="register"] .login-copy {
            display: none;
        }

        .login-form {
            position: relative;
            display: flex;
            flex-direction: column;
            width: 100%;
            margin-top: 22px;
        }

        .field-shell + .field-shell {
            margin-top: 24px;
        }

        body[data-login-mode="student"][data-student-mode="register"] .field-shell + .field-shell {
            margin-top: 16px;
        }

        body[data-login-mode="admin"] label[for="email"],
        body[data-login-mode="student"][data-student-mode="login"] label[for="email"],
        body[data-login-mode="student"][data-student-mode="register"] label[for="fullname"] {
            margin-top: 0;
        }

        .field-shell {
            display: flex;
            align-items: center;
            width: 100%;
            height: 62px;
            box-sizing: border-box;
            border: 1.5px solid var(--login-border);
            border-radius: 8px;
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(28, 42, 70, 0.03);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .field-shell:focus-within {
            border-color: #8db4f5;
            box-shadow: 0 0 0 4px rgba(6, 84, 217, 0.08);
        }

        .field-icon {
            flex: 0 0 62px;
            color: #4f5668;
            font-size: 22px;
            text-align: center;
        }

        .field-shell input {
            width: 100%;
            height: 100%;
            min-width: 0;
            border: 0;
            outline: 0;
            background: transparent;
            color: #17223a;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 0;
        }

        .field-shell input:-webkit-autofill,
        .field-shell input:-webkit-autofill:hover,
        .field-shell input:-webkit-autofill:focus {
            -webkit-text-fill-color: #17223a;
            box-shadow: 0 0 0 1000px #ffffff inset;
            transition: background-color 9999s ease-in-out 0s;
        }

        .field-shell input::placeholder {
            color: #747d91;
            opacity: 1;
        }

        .field-action {
            flex: 0 0 54px;
            border: 0;
            background: transparent;
            color: #545b6c;
            font-size: 20px;
            cursor: pointer;
            touch-action: manipulation;
        }

        .field-shell select {
            width: 100%;
            height: 100%;
            border: 0;
            outline: 0;
            background: transparent;
            color: #17223a;
            font-size: 16px;
            font-weight: 500;
            appearance: none;
            cursor: pointer;
        }

        .access-note {
            margin: 20px 0 0;
            color: var(--login-blue);
            font-size: 17px;
            font-weight: 500;
        }

        .student-actions {
            position: absolute;
            top: 286px;
            left: 0;
            right: 0;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin: 0;
            color: var(--login-muted);
            font-size: 15px;
            font-weight: 600;
        }

        .student-actions a {
            border: 0;
            background: transparent;
            color: var(--login-blue);
            font-size: 15px;
            font-weight: 800;
            text-decoration: none;
            cursor: pointer;
        }

        .admin-back {
            align-self: flex-start;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 20px 0 0;
            padding: 10px 16px;
            border: 1.5px solid transparent;
            border-radius: 8px;
            background: #f4f7fb;
            color: #545b6c;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .admin-back:hover {
            background: #e5effc;
            color: var(--login-blue);
            border-color: #cce0ff;
        }

        .login-error {
            display: none;
            margin: 16px 0 0;
            color: var(--danger, #e53e3e);
            font-size: 14px;
            font-weight: 700;
        }

        .login-error:not(:empty) {
            display: block;
        }

        .login-submit {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            width: 100%;
            height: 70px;
            margin-top: 32px;
            border: 0;
            border-radius: 8px;
            background: var(--login-blue);
            color: #ffffff;
            box-shadow: 0 10px 18px rgba(6, 84, 217, 0.18);
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0;
            cursor: pointer;
            touch-action: manipulation;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        .login-submit:hover {
            background: #064cc5;
            transform: translateY(-1px);
            box-shadow: 0 12px 22px rgba(6, 84, 217, 0.24);
        }

        .login-submit:disabled {
            cursor: not-allowed;
            opacity: 0.72;
            transform: none;
        }

        .login-submit i {
            font-size: 23px;
            line-height: 1;
        }

        .login-footer {
            margin-top: auto;
            color: #7a8192;
            font-size: 15px;
            font-weight: 500;
        }

        .instructions-link {
            position: fixed;
            top: max(18px, env(safe-area-inset-top));
            right: max(18px, env(safe-area-inset-right));
            z-index: 30;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            min-height: 40px;
            padding: 0 14px 0 16px;
            color: var(--login-blue);
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(6, 84, 217, 0.18);
            font-size: 17px;
            font-weight: 700;
            text-decoration: none;
            border-radius: 999px;
            box-shadow: 0 10px 28px rgba(16, 45, 95, 0.12);
            pointer-events: auto;
            touch-action: manipulation;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .instructions-link:hover,
        .instructions-link:focus-visible {
            border-color: rgba(6, 84, 217, 0.4);
            box-shadow: 0 14px 32px rgba(16, 45, 95, 0.16);
            transform: translateY(-1px);
        }

        .instructions-link i {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border: 2px solid currentColor;
            border-radius: 50%;
            font-size: 16px;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 1180px) {
            .login-page {
                grid-template-columns: minmax(390px, 500px) minmax(0, 1fr);
            }

            .login-panel {
                padding-left: 34px;
                padding-right: 34px;
            }

            .login-heading {
                font-size: 42px;
            }
        }

        @media (max-width: 960px) {
            body.login-body {
                overflow: auto;
                background: #f7fbff;
            }

            .login-page {
                display: flex;
                flex-direction: column;
                min-height: 100vh;
                min-height: 100svh;
                height: auto;
                overflow: visible;
                background: #f7fbff;
            }

            .login-panel {
                order: 1;
                width: 100%;
                min-width: 0;
                min-height: auto;
                height: auto;
                padding: 66px 22px 30px;
                align-items: center;
                box-shadow: none;
                overflow: visible;
                scrollbar-width: auto;
            }

            .brand-logo {
                width: min(292px, 82vw);
            }

            .login-content,
            .login-form,
            .field-shell,
            .login-submit {
                width: min(440px, 100%);
            }

            .login-content {
                margin-top: 28px;
            }

            .login-art {
                order: 2;
                display: block;
                min-height: auto;
                height: auto;
                padding: 0 16px 28px;
                background: #f7fbff;
            }

            .login-art-image {
                display: block;
                width: min(100%, 620px);
                height: auto;
                max-height: 310px;
                margin: 0 auto;
            }

            .student-actions {
                position: static;
                margin: -10px 0 24px;
            }

            .student-mode-tabs {
                width: 100%;
            }

            .login-heading {
                font-size: clamp(38px, 11vw, 48px);
            }

            .role-tabs {
                width: 100%;
            }

            .login-footer {
                width: min(440px, 100%);
                margin-top: 58px;
            }

            .instructions-link {
                top: max(12px, env(safe-area-inset-top));
                right: max(12px, env(safe-area-inset-right));
                min-height: 38px;
                padding: 0 12px 0 14px;
                font-size: 14px;
            }
        }

        @media (max-width: 520px) {
            .login-panel {
                padding-left: 16px;
                padding-right: 16px;
            }

            .login-heading {
                font-size: clamp(34px, 10vw, 42px);
            }

            .field-shell {
                height: 58px;
            }

            .field-shell + .field-shell {
                margin-top: 18px;
            }

            .field-icon {
                flex-basis: 54px;
            }

            .access-note {
                margin: 20px 0 22px;
            }

            .login-submit {
                height: 64px;
                font-size: 18px;
            }

            .instructions-link span {
                max-width: 142px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
        }
    </style>
</head>
<body class="login-body" data-login-mode="student" data-student-mode="login">
    <main class="login-page">
        <div class="login-art" aria-hidden="true">
            <img class="login-art-image" src="Assets/login-page-image.png" alt="">
        </div>

        <section class="login-panel" aria-label="Student login">
            <img class="brand-logo" src="Assets/nexus-dra-logo-highres.png" alt="Nexus DRA Training Center Pune">

            <div class="login-content">
                <h1 class="login-heading student-copy">Welcome <span>Back!</span></h1>
                <h1 class="login-heading admin-copy">Admin <span>Login</span></h1>
                <p class="login-subtitle student-copy">Login to continue your DRA training journey.</p>
                <p class="login-subtitle admin-copy">Login to manage your DRA training platform.</p>

                <div class="role-tabs" aria-label="Login type">
                    <button class="role-tab active" id="student-tab" type="button" aria-current="page">STUDENT</button>
                    <button class="role-tab" id="admin-tab" type="button">ADMIN</button>
                </div>

                <div class="student-mode-tabs student-only" aria-label="Student action">
                    <button class="student-mode-tab active" id="student-login-tab" type="button">Login</button>
                    <span aria-hidden="true">|</span>
                    <button class="student-mode-tab" id="student-register-tab" type="button">Register</button>
                </div>

                <form class="login-form" id="login-form" novalidate>
                    <label class="field-shell register-only" for="fullname">
                        <span class="field-icon" aria-hidden="true"><i class="fa-regular fa-user"></i></span>
                        <input type="text" id="fullname" name="fullname" placeholder="Full Name" autocomplete="name">
                    </label>

                    <label class="field-shell" for="email">
                        <span class="field-icon" aria-hidden="true"><i class="fa-regular fa-envelope"></i></span>
                        <input type="email" id="email" name="email" placeholder="Email" autocomplete="email" required>
                    </label>

                    <label class="field-shell" for="password">
                        <span class="field-icon" aria-hidden="true"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" id="password" name="password" placeholder="Password" autocomplete="current-password" required>
                        <button class="field-action" id="toggle-password" type="button" aria-label="Show password">
                            <i class="fa-regular fa-eye" aria-hidden="true"></i>
                        </button>
                    </label>

                    <label class="field-shell login-only" id="access-field" for="access-code">
                        <span class="field-icon" aria-hidden="true"><i class="fa-solid fa-key"></i></span>
                        <input type="text" id="access-code" name="access-code" placeholder="Monthly Access Code" autocomplete="off">
                        <span class="field-action" aria-hidden="true"><i class="fa-solid fa-lock"></i></span>
                    </label>

                    <p class="access-note student-copy login-copy">Contact your institute for access code</p>
                    <button class="admin-back admin-only" id="back-to-student" type="button">
                        <i class="fa-solid fa-arrow-left-long" aria-hidden="true"></i>
                        Back to Student Portal
                    </button>
                    <div class="login-error" id="error-msg" aria-live="polite"></div>

                    <button class="login-submit" id="login-btn" type="submit">
                        <span>LOGIN</span>
                        <i class="fa-solid fa-arrow-right-long" aria-hidden="true"></i>
                    </button>
                </form>
            </div>

            <p class="login-footer">&copy; 2026 IIBF. All rights reserved.</p>
        </section>

        <a class="instructions-link" href="instructions.html" aria-label="Click here for Instructions">
            <span>Click here for Instructions</span>
            <i class="fa-solid fa-info" aria-hidden="true"></i>
        </a>
    </main>

    <script>
        const form = document.getElementById('login-form');
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('toggle-password');
        const toggleIcon = togglePassword.querySelector('i');
        const loginButton = document.getElementById('login-btn');
        const loginButtonLabel = loginButton.querySelector('span');
        const errorDiv = document.getElementById('error-msg');
        const accessCodeInput = document.getElementById('access-code');
        const fullNameInput = document.getElementById('fullname');
        const studentTab = document.getElementById('student-tab');
        const adminTab = document.getElementById('admin-tab');
        const studentLoginTab = document.getElementById('student-login-tab');
        const studentRegisterTab = document.getElementById('student-register-tab');
        const backToStudent = document.getElementById('back-to-student');
        let loginMode = 'student';
        let studentMode = 'login';

        import('./JS/animations.js')
            .then(({ setupOfflineDetection }) => setupOfflineDetection())
            .catch(() => {});

        function resetSubmitState() {
            errorDiv.textContent = '';
            loginButton.disabled = false;
            loginButtonLabel.textContent = loginMode === 'student' && studentMode === 'register' ? 'REGISTER' : 'LOGIN';
        }

        function updateRequiredFields() {
            accessCodeInput.required = loginMode === 'student' && studentMode === 'login';
            fullNameInput.required = loginMode === 'student' && studentMode === 'register';
        }

        function setStudentMode(mode, shouldUpdateHash = true) {
            studentMode = mode;
            document.body.dataset.studentMode = mode;
            studentLoginTab.classList.toggle('active', mode === 'login');
            studentRegisterTab.classList.toggle('active', mode === 'register');
            updateRequiredFields();
            resetSubmitState();

            if (shouldUpdateHash && loginMode === 'student') {
                const cleanUrl = location.href.split('#')[0];
                history.replaceState(null, '', mode === 'register' ? `${cleanUrl}#register` : cleanUrl);
            }
        }

        function setLoginMode(mode, shouldUpdateHash = true) {
            loginMode = mode;
            document.body.dataset.loginMode = mode;

            studentTab.classList.toggle('active', mode === 'student');
            adminTab.classList.toggle('active', mode === 'admin');
            studentTab.setAttribute('aria-current', mode === 'student' ? 'page' : 'false');
            adminTab.setAttribute('aria-current', mode === 'admin' ? 'page' : 'false');
            updateRequiredFields();
            resetSubmitState();

            if (shouldUpdateHash) {
                const cleanUrl = location.href.split('#')[0];
                history.replaceState(null, '', mode === 'admin' ? `${cleanUrl}#admin` : cleanUrl);
            }
        }

        togglePassword.addEventListener('click', () => {
            const isHidden = passwordInput.type === 'password';
            passwordInput.type = isHidden ? 'text' : 'password';
            togglePassword.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
            toggleIcon.classList.toggle('fa-eye', !isHidden);
            toggleIcon.classList.toggle('fa-eye-slash', isHidden);
        });

        studentTab.addEventListener('click', () => {
            setLoginMode('student', false);
            setStudentMode('login');
        });
        adminTab.addEventListener('click', () => setLoginMode('admin'));
        studentLoginTab.addEventListener('click', () => setStudentMode('login'));
        studentRegisterTab.addEventListener('click', () => setStudentMode('register'));
        backToStudent.addEventListener('click', () => {
            setLoginMode('student', false);
            setStudentMode('login');
        });

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const fullName = fullNameInput.value.trim();
            const email = document.getElementById('email').value.trim();
            const password = passwordInput.value;
            const accessCode = accessCodeInput.value.trim();
            const language = 'en';

            errorDiv.textContent = '';

            if (!email || !password || (loginMode === 'student' && studentMode === 'login' && !accessCode) || (loginMode === 'student' && studentMode === 'register' && !fullName)) {
                errorDiv.textContent = 'Please fill all fields.';
                return;
            }

            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters.';
                return;
            }

            loginButtonLabel.textContent = loginMode === 'student' && studentMode === 'register' ? 'REGISTERING...' : 'LOGGING IN...';
            loginButton.disabled = true;

            if (loginMode === 'admin') {
                window.location.href = 'Admin/dashboard.html';
                return;
            }

            if (studentMode === 'register') {
                let registerStudentBasic;
                try {
                    ({ registerStudentBasic } = await import('./JS/auth.js'));
                } catch (error) {
                    errorDiv.textContent = 'Unable to load registration services. Please run the app through a local server.';
                    resetSubmitState();
                    return;
                }

                const result = await registerStudentBasic(fullName, email, password, language);

                if (result.error) {
                    errorDiv.textContent = result.error;
                    resetSubmitState();
                    return;
                }

                window.location.href = 'Student/dashboard.html';
                return;
            }

            let loginStudent;
            try {
                ({ loginStudent } = await import('./JS/auth.js'));
            } catch (error) {
                errorDiv.textContent = 'Unable to load login services. Please run the app through a local server.';
                resetSubmitState();
                return;
            }

            const result = await loginStudent(email, password, accessCode);

            if (result.error) {
                errorDiv.textContent = result.error;
                resetSubmitState();
                return;
            }

            window.location.href = 'Student/dashboard.html';
        });

        function applyRouteFromHash() {
            if (location.hash === '#admin') {
                setLoginMode('admin', false);
                return;
            }

            setLoginMode('student', false);
            setStudentMode(location.hash === '#register' ? 'register' : 'login', false);
        }

        window.addEventListener('hashchange', applyRouteFromHash);
        applyRouteFromHash();
    </script>
</body>
</html>
