<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRA Training by IIBF</title>
    <link rel="stylesheet" href="CSS/main.css">
    <link rel="stylesheet" href="CSS/animations.css">
    <!-- Font Awesome for offline icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Splash specific styles */
        body {
            /* background-color: var(--primary-dark); */
            color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .splash-content {
            z-index: 10;
            text-align: center;
            width: 100%;
            padding: 20px;
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background-color: var(--white);
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            color: var(--primary-dark);
            font-size: 40px;
            font-weight: 800;
            margin-bottom: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }

        .app-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--white);
        }

        .app-subtitle {
            font-size: 14px;
            color: var(--primary-light);
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 18px;
            font-weight: 500;
            color: var(--white);
            margin-bottom: 48px;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
        }

        .action-buttons .btn {
            font-size: 18px;
            padding: 16px;
        }
        
        .btn-white {
            background-color: var(--white);
            color: var(--primary-dark);
        }

        .lang-selector {
            position: absolute;
            bottom: 30px;
            display: flex;
            gap: 16px;
            color: var(--primary-light);
            font-size: 14px;
            z-index: 10;
        }

        .lang-selector span {
            cursor: pointer;
            transition: color 0.2s;
        }

        .lang-selector span.active {
            color: var(--white);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none;"></canvas>

    <!-- Decorative Shapes & Wave Background -->
    <div class="shape-1"></div>
    <div class="shape-2"></div>
    <div class="shape-3"></div>
    


    <div class="splash-content" style="position:relative; z-index:1;">
        <div class="logo-circle">D</div>
        <h1 class="app-title split-text">
            <span style="animation-delay: 0.05s">D</span><span style="animation-delay: 0.1s">R</span><span style="animation-delay: 0.15s">A</span>
            <span>&nbsp;</span>
            <span style="animation-delay: 0.2s">T</span><span style="animation-delay: 0.25s">r</span><span style="animation-delay: 0.3s">a</span><span style="animation-delay: 0.35s">i</span><span style="animation-delay: 0.4s">n</span><span style="animation-delay: 0.45s">i</span><span style="animation-delay: 0.5s">n</span><span style="animation-delay: 0.55s">g</span>
        </h1>
        <div class="app-subtitle">by IIBF</div>
        
        <p class="tagline" id="tagline-text"></p>

        <div class="action-buttons">
            <a href="register.html" class="btn btn-white btn-block">Register</a>
            <a href="login.html" class="btn btn-outline-white btn-block">Login</a>
        </div>
    </div>

    <div class="lang-selector">
        <span class="active">EN</span> | <span>हिंदी</span> | <span>मराठी</span>
    </div>

    <script type="module">
        import { initTypewriter, setupOfflineDetection } from './JS/animations.js';
        
        // Setup offline detection
        setupOfflineDetection();
        
        // Init typewriter for tagline after heading animation completes (~1050ms)
        const tagline = document.getElementById('tagline-text');
        initTypewriter(tagline, "Prepare. Practice. Pass.", 60, 1050);
    </script>

<script>
(function() {
  const canvas = document.getElementById('bg-canvas');
  const gl = canvas.getContext('webgl2');
  if (!gl) return;

  const vertex = `#version 300 es
  in vec2 position;
  void main() {
    gl_Position = vec4(position, 0.0, 1.0);
  }`;

  const fragment = `#version 300 es
  precision highp float;
  uniform vec2 iResolution;
  uniform float iTime;
  out vec4 fragColor;

  vec2 hash(vec2 p){
    p=vec2(dot(p,vec2(2127.1,81.17)),dot(p,vec2(1269.5,283.37)));
    return fract(sin(p)*43758.5453);
  }
  float noise(vec2 p){
    vec2 i=floor(p),f=fract(p),u=f*f*(3.0-2.0*f);
    return 0.5+0.5*mix(
      mix(dot(-1.0+2.0*hash(i),f),dot(-1.0+2.0*hash(i+vec2(1,0)),f-vec2(1,0)),u.x),
      mix(dot(-1.0+2.0*hash(i+vec2(0,1)),f-vec2(0,1)),dot(-1.0+2.0*hash(i+vec2(1,1)),f-vec2(1,1)),u.x),
      u.y);
  }
  void main(){
    vec2 uv = gl_FragCoord.xy / iResolution.xy;
    float t = iTime * 0.25;
    float ratio = iResolution.x / iResolution.y;

    vec2 tuv = uv - 0.5;
    tuv.y /= ratio;

    float n = noise(tuv * 2.0 + t * 0.3);
    tuv.x += sin(tuv.y * 5.0 + t * 2.0) / 50.0;
    tuv.y += sin(tuv.x * 7.5 + t * 2.0) / 50.0;

    vec3 color1 = vec3(0.102, 0.337, 0.859); // #1a56db blue
    vec3 color2 = vec3(0.055, 0.216, 0.627); // #0e37a0 dark blue
    vec3 color3 = vec3(0.949, 0.961, 1.0);   // #f2f5ff near white

    float blend1 = smoothstep(-0.3, 0.3, tuv.x + n * 0.5);
    float blend2 = smoothstep(0.0, 0.6, tuv.y + n * 0.3);

    vec3 col = mix(color2, color1, blend1);
    col = mix(col, color3 * 0.15 + color1, blend2 * 0.4);

    float grain = fract(sin(dot(uv * 2.0, vec2(12.9898, 78.233))) * 43758.5453);
    col += (grain - 0.5) * 0.04;

    col = clamp(col, 0.0, 1.0);
    fragColor = vec4(col, 1.0);
  }`;

  function createShader(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }

  const prog = gl.createProgram();
  gl.attachShader(prog, createShader(gl.VERTEX_SHADER, vertex));
  gl.attachShader(prog, createShader(gl.FRAGMENT_SHADER, fragment));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);

  const pos = gl.getAttribLocation(prog, 'position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);

  const uRes = gl.getUniformLocation(prog, 'iResolution');
  const uTime = gl.getUniformLocation(prog, 'iTime');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.uniform2f(uRes, canvas.width, canvas.height);
  }

  window.addEventListener('resize', resize);
  resize();

  const t0 = performance.now();
  function loop(t) {
    gl.uniform1f(uTime, (t - t0) * 0.001);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>

</body>
</html>
