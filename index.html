<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRA Training by IIBF</title>
    <link rel="stylesheet" href="CSS/main.css">
    <link rel="stylesheet" href="CSS/animations.css">
    <!-- Font Awesome for offline icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Splash specific styles */
        body {
            background-color: var(--primary-dark);
            color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .splash-content {
            z-index: 10;
            text-align: center;
            width: 100%;
            padding: 20px;
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background-color: var(--white);
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            color: var(--primary-dark);
            font-size: 40px;
            font-weight: 800;
            margin-bottom: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }

        .app-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--white);
        }

        .app-subtitle {
            font-size: 14px;
            color: var(--primary-light);
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 18px;
            font-weight: 500;
            color: var(--white);
            margin-bottom: 48px;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
        }

        .action-buttons .btn {
            font-size: 18px;
            padding: 16px;
        }
        
        .btn-white {
            background-color: var(--white);
            color: var(--primary-dark);
        }

        .lang-selector {
            position: absolute;
            bottom: 30px;
            display: flex;
            gap: 16px;
            color: var(--primary-light);
            font-size: 14px;
            z-index: 10;
        }

        .lang-selector span {
            cursor: pointer;
            transition: color 0.2s;
        }

        .lang-selector span.active {
            color: var(--white);
            font-weight: 700;
        }
    </style>
</head>
<body>

    <!-- Decorative Shapes & Wave Background -->
    <div class="shape-1"></div>
    <div class="shape-2"></div>
    <div class="shape-3"></div>
    
    <div class="line-waves-bg">
        <div class="line-wave"></div>
        <div class="line-wave"></div>
        <div class="line-wave"></div>
        <div class="line-wave"></div>
        <div class="line-wave"></div>
    </div>

    <div class="splash-content">
        <div class="logo-circle">D</div>
        <h1 class="app-title split-text">
            <span style="animation-delay: 0.05s">D</span><span style="animation-delay: 0.1s">R</span><span style="animation-delay: 0.15s">A</span>
            <span>&nbsp;</span>
            <span style="animation-delay: 0.2s">T</span><span style="animation-delay: 0.25s">r</span><span style="animation-delay: 0.3s">a</span><span style="animation-delay: 0.35s">i</span><span style="animation-delay: 0.4s">n</span><span style="animation-delay: 0.45s">i</span><span style="animation-delay: 0.5s">n</span><span style="animation-delay: 0.55s">g</span>
        </h1>
        <div class="app-subtitle">by IIBF</div>
        
        <p class="tagline" id="tagline-text"></p>

        <div class="action-buttons">
            <a href="register.html" class="btn btn-white btn-block shimmer-btn">Register</a>
            <a href="login.html" class="btn btn-outline-white btn-block shimmer-btn">Login</a>
        </div>
    </div>

    <div class="lang-selector">
        <span class="active">EN</span> | <span>हिंदी</span> | <span>मराठी</span>
    </div>

    <script type="module">
        import { initTypewriter, setupOfflineDetection } from './JS/animations.js';
        
        // Setup offline detection
        setupOfflineDetection();
        
        // Init typewriter for tagline after heading animation completes (~1050ms)
        const tagline = document.getElementById('tagline-text');
        initTypewriter(tagline, "Prepare. Practice. Pass.", 60, 1050);
    </script>

</body>
</html>
