<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | DRA Training</title>
    <link rel="stylesheet" href="CSS/main.css">
    <link rel="stylesheet" href="CSS/animations.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <canvas id="bg-canvas" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none;"></canvas>

    <div class="shape-bg-light-container">
        <div class="shape-1" style="background-color: var(--primary-light); top: -200px; right: -100px; opacity: 0.3;"></div>
        <div class="shape-2" style="background-color: var(--primary-medium); top: -50px; left: -150px; opacity: 0.1;"></div>
    </div>

    <div class="line-waves-bg">
        <div class="line-wave"></div>
        <div class="line-wave"></div>
        <div class="line-wave"></div>
        <div class="line-wave"></div>
        <div class="line-wave"></div>
    </div>

    <div class="container d-flex flex-column justify-center" style="min-height: 100vh; position:relative; z-index:1;">

        <div class="text-center mb-3">
            <h2 style="color: var(--primary-dark); font-size: 28px;">Create Account</h2>
            <p>Start your DRA preparation</p>
        </div>

        <div class="card slide-up-fade">

            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" id="fullname" class="form-control" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div style="position: relative;">
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    <span id="toggle-password" style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 18px; user-select: none;">👁️</span>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Language Preference</label>
                <select id="language" class="form-control" required style="appearance: none;">
                    <option value="en">English</option>
                    <option value="hi">हिंदी</option>
                    <option value="mr">मराठी</option>
                </select>
            </div>

            <div class="form-group mb-3">
                <label class="form-label" style="display: flex; justify-content: space-between;">
                    Monthly Access Code <span>🔒</span>
                </label>
                <div class="border-beam-container" style="border-radius: 8px;">
                    <input type="text" id="access-code" class="form-control input-highlight" placeholder="Enter Access Code" required style="background: transparent; position: relative; z-index: 2; border: none;">
                </div>
                <p style="font-size: 12px; margin-top: 6px; color: var(--danger);">* Get this code from your institute</p>
                <div id="error-msg" style="color: var(--danger); font-size: 13px; margin-top: 6px; font-weight: 600;"></div>
                <div id="success-msg" style="color: var(--success); font-size: 13px; margin-top: 6px; font-weight: 600;"></div>
            </div>

            <button id="register-btn" class="btn btn-primary btn-block shimmer-btn">Register</button>

        </div>

        <div class="text-center mt-3">
            <p>Already have an account? <a href="/login.html">Login</a></p>
            <p class="mt-2" style="font-size: 12px;"><a href="Admin/login.html" style="color: var(--text-muted);">Admin Portal</a></p>
        </div>

    </div>

    <script type="module">
        import { registerStudent } from './JS/auth.js'

        document.getElementById('toggle-password').addEventListener('click', () => {
            const input = document.getElementById('password')
            const icon = document.getElementById('toggle-password')
            if (input.type === 'password') {
                input.type = 'text'
                icon.textContent = '🙈'
            } else {
                input.type = 'password'
                icon.textContent = '👁️'
            }
        })

        document.getElementById('register-btn').addEventListener('click', async () => {
            const fullName   = document.getElementById('fullname').value.trim()
            const email      = document.getElementById('email').value.trim()
            const password   = document.getElementById('password').value
            const language   = document.getElementById('language').value
            const accessCode = document.getElementById('access-code').value.trim()
            const errorDiv   = document.getElementById('error-msg')
            const successDiv = document.getElementById('success-msg')
            const btn        = document.getElementById('register-btn')

            errorDiv.textContent = ''
            successDiv.textContent = ''

            if (!fullName || !email || !password || !accessCode) {
                errorDiv.textContent = 'Please fill all fields.'
                return
            }

            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters.'
                return
            }

            btn.textContent = 'Registering...'
            btn.disabled = true

            const result = await registerStudent(fullName, email, password, language, accessCode)

            if (result.error) {
                errorDiv.textContent = result.error
                btn.textContent = 'Register'
                btn.disabled = false
            } else {
                successDiv.textContent = 'Account created! Redirecting...'
                setTimeout(() => {
                    window.location.href = '/Student/dashboard.html'
                }, 1500)
            }
        })
    </script>

        import { setupOfflineDetection } from './JS/animations.js'
        setupOfflineDetection();
    </script>

<script>
(function() {
  const canvas = document.getElementById('bg-canvas');
  const gl = canvas.getContext('webgl2');
  if (!gl) return;

  const vertex = `#version 300 es
  in vec2 position;
  void main() {
    gl_Position = vec4(position, 0.0, 1.0);
  }`;

  const fragment = `#version 300 es
  precision highp float;
  uniform vec2 iResolution;
  uniform float iTime;
  out vec4 fragColor;

  vec2 hash(vec2 p){
    p=vec2(dot(p,vec2(2127.1,81.17)),dot(p,vec2(1269.5,283.37)));
    return fract(sin(p)*43758.5453);
  }
  float noise(vec2 p){
    vec2 i=floor(p),f=fract(p),u=f*f*(3.0-2.0*f);
    return 0.5+0.5*mix(
      mix(dot(-1.0+2.0*hash(i),f),dot(-1.0+2.0*hash(i+vec2(1,0)),f-vec2(1,0)),u.x),
      mix(dot(-1.0+2.0*hash(i+vec2(0,1)),f-vec2(0,1)),dot(-1.0+2.0*hash(i+vec2(1,1)),f-vec2(1,1)),u.x),
      u.y);
  }
  void main(){
    vec2 uv = gl_FragCoord.xy / iResolution.xy;
    float t = iTime * 0.25;
    float ratio = iResolution.x / iResolution.y;

    vec2 tuv = uv - 0.5;
    tuv.y /= ratio;

    float n = noise(tuv * 2.0 + t * 0.3);
    tuv.x += sin(tuv.y * 5.0 + t * 2.0) / 50.0;
    tuv.y += sin(tuv.x * 7.5 + t * 2.0) / 50.0;

    vec3 color1 = vec3(0.102, 0.337, 0.859); // #1a56db blue
    vec3 color2 = vec3(0.055, 0.216, 0.627); // #0e37a0 dark blue
    vec3 color3 = vec3(0.949, 0.961, 1.0);   // #f2f5ff near white

    float blend1 = smoothstep(-0.3, 0.3, tuv.x + n * 0.5);
    float blend2 = smoothstep(0.0, 0.6, tuv.y + n * 0.3);

    vec3 col = mix(color2, color1, blend1);
    col = mix(col, color3 * 0.15 + color1, blend2 * 0.4);

    float grain = fract(sin(dot(uv * 2.0, vec2(12.9898, 78.233))) * 43758.5453);
    col += (grain - 0.5) * 0.04;

    col = clamp(col, 0.0, 1.0);
    fragColor = vec4(col, 1.0);
  }`;

  function createShader(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }

  const prog = gl.createProgram();
  gl.attachShader(prog, createShader(gl.VERTEX_SHADER, vertex));
  gl.attachShader(prog, createShader(gl.FRAGMENT_SHADER, fragment));
  gl.linkProgram(prog);
  gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);

  const pos = gl.getAttribLocation(prog, 'position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);

  const uRes = gl.getUniformLocation(prog, 'iResolution');
  const uTime = gl.getUniformLocation(prog, 'iTime');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.uniform2f(uRes, canvas.width, canvas.height);
  }

  window.addEventListener('resize', resize);
  resize();

  const t0 = performance.now();
  function loop(t) {
    gl.uniform1f(uTime, (t - t0) * 0.001);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>

</body>
</html>
